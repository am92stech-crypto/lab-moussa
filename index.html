<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-Moussa | Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; text-align: center; max-width: 400px; }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        .status { display: inline-block; padding: 5px 15px; background: #22c55e; color: white; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 1.5rem; }
        p { color: #94a3b8; line-height: 1.6; }
        .tech-stack { margin-top: 1.5rem; display: flex; justify-content: center; gap: 10px; }
        .badge { background: #334155; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; color: #38bdf8; border: 1px solid #38bdf8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">● SERVEUR ACTIF</div>
        <h1>Lab-Moussa</h1>
        <p>Bienvenue sur mon infrastructure Docker sécurisée. Ce site est propulsé par Nginx et MariaDB.</p>
        <div class="tech-stack">
            <span class="badge">DOCKER</span>
            <span class="badge">NGINX</span>
            <span class="badge">MARIADB</span>
            <span class="badge">GITHUB</span>
        </div>
    </div>
</body>
</html>
